controller_manager:
  ros__parameters:
    update_rate: 100  # Hz

    # The two controllers we want to load
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    mecanum_drive_controller:
      type: mecanum_drive_controller/MecanumDriveController

mecanum_drive_controller:
  ros__parameters:
    # Wheel joint names
    front_left_wheel_name: FL_joint
    front_right_wheel_name: FR_joint
    rear_left_wheel_name: BL_joint
    rear_right_wheel_name: BR_joint

    # Kinematic parameters
    wheel_separation_x: 0.4  # Distance between front and rear wheels
    wheel_separation_y: 0.3  # Distance between left and right wheels
    wheel_radius: 0.05       # Radius of the wheels

    # Odometry settings
    odom_frame_id: odom
    base_frame_id: base_link
    publish_rate: 50.0
    enable_odom_tf: true